name: Deploy Workers

on:
  push:
    branches: [main]
    paths:
      - "workers/**"

jobs:
  deploy:
    name: Build & Deploy Lambda Functions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # TODO: Build each worker into a deployment artifact.
      # Example: pnpm --filter ./workers/enrichment-worker build
